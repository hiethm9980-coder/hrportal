name: hr_portal
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.1.0+6

environment:
  sdk: ^3.11.0

dependencies:

  flutter_localizations:
    sdk: flutter
    
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Network (Data Layer — DO NOT CHANGE) ──
  dio: ^5.9.1
  flutter_secure_storage: ^10.0.0
  get_it: ^9.2.1
  equatable: ^2.0.8
  uuid: ^4.5.3

  # ── State Management ──
  flutter_riverpod: ^3.2.1

  # ── Routing ──
  go_router: ^17.1.0

  # ── Utilities ──
  intl: ^0.20.2
  jiffy: ^6.4.4

  # firebase
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  firebase_remote_config: ^6.3.0

  # awesome notifications
  awesome_notifications: ^0.11.0

  # share plus
  share_plus: ^12.0.1
  url_launcher: ^6.3.2

  # sql
  sqlite3: ^3.1.1
  sqlite3_flutter_libs: ^0.5.41

  pwa_install: ^0.0.6

  # send notification fcm
  http: ^1.6.0
  googleapis_auth: ^2.0.0

  # cached network image
  cached_network_image: ^3.4.1

  # fonts
  # google_fonts: ^6.2.1  # replaced with local fonts

  # widgets
  flutter_slidable: ^4.0.3

  # file picker (for leave attachments)
  file_picker: ^11.0.2
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  table_calendar: 3.2.0


  path: any

  # Login audit: JSON device snapshot. device_info_plus 13.x needs win32 ^6, which
  # conflicts with flutter_secure_storage_windows / file_picker in this repo — use 11.x.
  device_info_plus: ^11.3.0
  package_info_plus: ^8.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

