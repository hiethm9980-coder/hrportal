<!DOCTYPE html><html><head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="description" content="HR Portal Web Application">

  <!-- PWA meta -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="HR Portal">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <title>HR Portal</title>

  

  
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  
  
  
  
  <style>
    html { height: 100%; }
    body {
      margin: 0;
      min-height: 100%;
      background-color: #0F2952;
    }
    /* مؤشر تحميل بسيط حتى يظهر Flutter للمستخدم. لا نستخدم صورة splash
       لأنها كانت تبقى عالقة على متصفحات الموبايل (Chrome Android) عندما
       يتأخر تحميل main.dart.js / CanvasKit — وكانت دالة removeSplashFromWeb
       لا تُستدعى أبداً. Flutter لديه SplashScreen خاص يظهر فور التحميل. */
    .boot-spinner {
      position: fixed;
      top: 50%; left: 50%;
      width: 48px; height: 48px;
      margin: -24px 0 0 -24px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #e7b245;
      border-radius: 50%;
      animation: boot-spin 0.9s linear infinite;
      z-index: 0;
    }
    @keyframes boot-spin { to { transform: rotate(360deg); } }
    /* أخفِ السبينر فور وصول flutter-view للـ DOM */
    flutter-view ~ .boot-spinner,
    body:has(flutter-view) .boot-spinner { display: none; }
  </style>
</head>

<body>
  <div class="boot-spinner" aria-hidden="true"></div>


  <!-- Firebase Messaging Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async function () {
        try {
          const registration = await navigator.serviceWorker.register(
            "./firebase-messaging-sw.js",
            { scope: "./firebase-cloud-messaging-push-scope" }
          );
          console.log(
            "Firebase Messaging Service Worker registered:",
            registration.scope
          );
        } catch (error) {
          console.error(
            "Firebase Messaging Service Worker registration failed:",
            error
          );
        }
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async=""></script>

  <!-- 1) Observer: يخفي السبينر فور أن يُركّب Flutter عنصره (يدعم كل
       المتصفحات بما فيها القديمة التي لا تدعم :has() في CSS).
       2) Watchdog: إن لم يُحمَّل Flutter خلال 30 ثانية، يعرض رسالة بدل
       السبينر المعلَّق إلى الأبد على الشبكات البطيئة (4G/3G). -->
  <script>
    (function () {
      var spinner = document.querySelector('.boot-spinner');
      var loaded = false;

      function markLoaded() {
        if (loaded) return;
        loaded = true;
        if (spinner) spinner.remove();
      }

      // مراقبة DOM للكشف عن flutter-view (يظهر فور تركيب Flutter للمحتوى).
      var observer = new MutationObserver(function () {
        if (document.querySelector('flutter-view, flt-glass-pane')) {
          markLoaded();
          observer.disconnect();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });

      // Watchdog: إن لم يُحمَّل Flutter خلال 30 ثانية، اعرض رسالة الخطأ.
      setTimeout(function () {
        if (loaded) return;
        observer.disconnect();
        if (spinner) spinner.remove();
        var msg = document.createElement('div');
        msg.style.cssText =
          'position:fixed;inset:0;display:flex;flex-direction:column;' +
          'align-items:center;justify-content:center;color:#fff;' +
          'font-family:system-ui,Arial,sans-serif;padding:24px;' +
          'text-align:center;line-height:1.5;';
        msg.innerHTML =
          '<div style="font-size:18px;font-weight:700;margin-bottom:8px;">' +
          'Loading failed</div>' +
          '<div style="opacity:.7;font-size:13px;max-width:320px;">' +
          'The app could not load. Check your internet connection ' +
          '(turn off VPN if enabled) and reload the page.</div>' +
          '<button onclick="location.reload(true)" style="margin-top:16px;' +
          'padding:10px 20px;border:0;border-radius:8px;background:#e7b245;' +
          'color:#0F2952;font-weight:700;font-size:14px;cursor:pointer;">' +
          'Reload</button>';
        document.body.appendChild(msg);
      }, 30000);
    })();
  </script>

  <!-- PWA install support -->
  <script>
    let deferredPrompt = null;

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    function promptInstall() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
    }

    window.addEventListener("appinstalled", () => {
      deferredPrompt = null;
      if (typeof appInstalled === "function") {
        appInstalled();
      }
    });

    function getLaunchMode() {
      const isStandalone =
        window.matchMedia("(display-mode: standalone)").matches;

      if (deferredPrompt && typeof hasPrompt === "function") {
        hasPrompt();
      }

      if (document.referrer.startsWith("android-app://")) {
        if (typeof appLaunchedAsTWA === "function") {
          appLaunchedAsTWA();
        }
      } else if (navigator.standalone || isStandalone) {
        if (typeof appLaunchedAsPWA === "function") {
          appLaunchedAsPWA();
        }
      } else {
        if (typeof appLaunchedInBrowser === "function") {
          appLaunchedInBrowser();
        }
      }
    }
  </script>


</body></html>
