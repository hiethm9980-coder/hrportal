<!DOCTYPE html><html><head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="description" content="HR Portal Web Application">

  <!-- PWA meta -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="HR Portal">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <title>HR Portal</title>

  

  
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  
  
  
  
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #e2e7e9;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #161618;
          }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>

<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  
  
  
  

  <!-- Firebase Messaging Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async function () {
        try {
          const registration = await navigator.serviceWorker.register(
            "./firebase-messaging-sw.js",
            { scope: "./firebase-cloud-messaging-push-scope" }
          );
          console.log(
            "Firebase Messaging Service Worker registered:",
            registration.scope
          );
        } catch (error) {
          console.error(
            "Firebase Messaging Service Worker registration failed:",
            error
          );
        }
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async=""></script>

  <!-- PWA install support -->
  <script>
    let deferredPrompt = null;

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    function promptInstall() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
    }

    window.addEventListener("appinstalled", () => {
      deferredPrompt = null;
      if (typeof appInstalled === "function") {
        appInstalled();
      }
    });

    function getLaunchMode() {
      const isStandalone =
        window.matchMedia("(display-mode: standalone)").matches;

      if (deferredPrompt && typeof hasPrompt === "function") {
        hasPrompt();
      }

      if (document.referrer.startsWith("android-app://")) {
        if (typeof appLaunchedAsTWA === "function") {
          appLaunchedAsTWA();
        }
      } else if (navigator.standalone || isStandalone) {
        if (typeof appLaunchedAsPWA === "function") {
          appLaunchedAsPWA();
        }
      } else {
        if (typeof appLaunchedInBrowser === "function") {
          appLaunchedInBrowser();
        }
      }
    }
  </script>


</body></html>
